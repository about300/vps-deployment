<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VPS Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>VPS Dashboard</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索或输入规则 URL">
            <button onclick="search()">搜索/跳转</button>
        </div>
        <div class="converter">
            <h2>订阅转换</h2>
            <input type="text" id="subInput" placeholder="输入 VLESS 链接">
            <button onclick="convertSub()">转换为 Clash YAML</button>
            <pre id="subOutput"></pre>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>

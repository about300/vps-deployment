<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subconverter Frontend</title>
<script>
async function convert() {
    const url = document.getElementById("sub_url").value;
    const token = "vless-secure-token-123"; // 和 config.json 一致
    const res = await fetch(`http://YOUR_SERVER_IP:8081/sub?target=clash&url=${encodeURIComponent(url)}&token=${token}`);
    const data = await res.text();
    document.getElementById("output").textContent = data;
}
</script>
</head>
<body>
<h1>VLESS Subconverter</h1>
<input type="text" id="sub_url" placeholder="输入订阅链接"/>
<button onclick="convert()">转换</button>
<pre id="output"></pre>
</body>
</html>
